# Cargo config — picked up by every cargo invocation rooted at this repo.
#
# Linker: use `mold` (https://github.com/rui314/mold) for ~5-10× faster
# linking than the default `ld`. Helps most on the `release-fast` profile
# (lto = false) where the link step is pure linking; with `lto = "fat"` on
# the `release` profile, much of the "link" time is LLVM IR merging which
# mold can't accelerate, but mold still shaves ~5s off the final ld step.
#
# Install on Arch: `sudo pacman -S mold`. Drop this file (or comment the
# rustflags line) if mold isn't available; cargo will fall back to `ld`.

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
