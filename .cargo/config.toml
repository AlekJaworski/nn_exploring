# Cargo config — picked up by every cargo invocation rooted at this repo.
#
# Linker: `mold` (https://github.com/rui314/mold) gives ~5-10× faster
# linking than default `ld`. Local devs on Arch: `sudo pacman -S mold` then
# uncomment the block below (or `export RUSTFLAGS=...` in your shell rc).
#
# Kept commented in the repo because the manylinux CI containers used by
# release.yml don't have mold installed and `cc: error: unrecognized
# command-line option '-fuse-ld=mold'` would break the wheel build.

# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]
