name: Test Build

on:
  push:
    branches:
      - 'master'
      - 'claude/**'
      - 'validation-framework*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-linux:
    name: Test Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          RUST_BACKTRACE: "1"
        with:
          target: x86_64
          args: --release --out dist -i python3.12 --features python,blas,blas-system
          sccache: 'true'
          manylinux: auto
          before-script-linux: |
            set -e
            echo "=== Installing build dependencies ==="
            if command -v yum &> /dev/null; then
              echo "Using yum package manager"
              yum install -y openblas-devel openssl-devel pkgconfig
            else
              echo "Using apt package manager"
              apt-get update
              apt-get install -y libopenblas-dev libssl-dev pkg-config
            fi
            echo "=== Verifying OpenBLAS ==="
            pkg-config --libs openblas || true

      - name: Verify wheel
        run: |
          echo "=== Built wheels ==="
          ls -lh dist/
          python -m pip install --upgrade pip
          python -m pip install wheel numpy
          for wheel in dist/*.whl; do
            echo "Checking $wheel"
            python -m wheel tags "$wheel" || true
            unzip -l "$wheel" | grep -E "\.so$" || true
          done

      - name: Test wheel
        run: |
          echo "=== Installing wheel ==="
          python -m pip install --upgrade pip numpy pytest
          python -m pip install --no-index --find-links dist/ mgcv_rust
          echo "=== Usability smoke (multi-family fit/predict) ==="
          python -m pytest tests/usability -q
          echo "=== Checking shared library deps ==="
          ldd $(python -c "import mgcv_rust; import os; print(os.path.dirname(mgcv_rust.__file__))")/mgcv_rust*.so || true

      - name: Run correctness validation
        run: |
          python -m pip install numpy
          python scripts/python/validate_correctness.py

      - name: Run performance validation (CI mode)
        run: |
          python scripts/python/validate_performance.py --ci || echo "Performance test skipped or failed (non-blocking in CI)"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: test-wheels-linux-x86_64
          path: dist

  test-macos:
    # macOS Apple Silicon (aarch64) only by default.
    # Intel mac (macos-13, x86_64) is opt-in: GitHub's macos-13 runner pool
    # is small and routinely queues 30+ minutes. To re-enable, add another
    # matrix entry: { target: x86_64, runner: macos-13 }.
    name: Test macOS ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64
            runner: macos-latest  # Apple Silicon (M-series)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # For blas-static: openblas-src compiles from source, no brew openblas needed.
      # Install only the Fortran compiler. Mirrors release.yml so test == ship.
      - name: Install build tools
        run: |
          brew install gcc  # provides gfortran

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          OPENBLAS_STATIC: "1"
          RUST_BACKTRACE: "1"
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.12 --features python,blas,blas-static
          sccache: 'true'

      - name: Test wheel
        run: |
          echo "=== Installing wheel ==="
          python3 -m pip install numpy pytest
          python3 -m pip install --no-index --find-links dist/ mgcv_rust
          echo "=== Usability smoke (multi-family fit/predict) ==="
          python3 -m pytest tests/usability -q
          echo "=== Checking dependencies ==="
          otool -L $(python3 -c "import mgcv_rust; import os; print(os.path.dirname(mgcv_rust.__file__))")/mgcv_rust*.so || true

      - name: Run correctness validation
        run: |
          python3 scripts/python/validate_correctness.py

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: test-wheels-macos-${{ matrix.target }}
          path: dist

  test-windows:
    name: Test Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Windows uses Intel MKL static — no gfortran needed, MKL is precompiled
      # by intel-mkl-src crate. ~80 MB wheel but reliable on Windows.
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          RUST_BACKTRACE: "1"
        with:
          target: x86_64
          args: --release --out dist -i python3.12 --features python,blas,blas-mkl-static
          sccache: 'true'

      - name: Test wheel
        shell: bash
        run: |
          echo "=== Installing wheel ==="
          python -m pip install --upgrade pip numpy pytest
          python -m pip install --no-index --find-links dist/ mgcv_rust
          echo "=== Usability smoke (multi-family fit/predict) ==="
          python -m pytest tests/usability -q

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: test-wheels-windows-x86_64
          path: dist

  # -----------------------------------------------------------------------
  # Verify jobs: gated to master pushes. Each runs on a fresh runner of the
  # same OS, downloads the wheel artifact, serves it via pypiserver, and
  # tests `pip install --index-url <local>` — exercising pip's real
  # wheel-tag matching, dep resolution, and abi3 selection. Catches things
  # like manylinux tag mismatches and abi3 forward-compat regressions that
  # local-file installs (`pip install ./dist/*.whl`) skip.
  # -----------------------------------------------------------------------

  verify-linux:
    name: Verify pip install (Linux)
    needs: test-linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: test-wheels-linux-x86_64
          path: dist
      - name: pypiserver + pip install + usability suite
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip pypiserver pytest
          pypi-server run -p 8080 -i 127.0.0.1 -P . -a . dist/ &
          PYPI_PID=$!
          sleep 3
          curl -fsS http://127.0.0.1:8080/simple/ > /dev/null
          python -m pip install \
            --index-url http://127.0.0.1:8080/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            mgcv-rust
          kill "$PYPI_PID" || true
          python -c "import mgcv_rust; print('installed at', mgcv_rust.__file__)"
          python -m pytest tests/usability -q

  verify-macos:
    name: Verify pip install (macOS aarch64)
    needs: test-macos
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: test-wheels-macos-aarch64
          path: dist
      - name: pypiserver + pip install + usability suite
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip pypiserver pytest
          pypi-server run -p 8080 -i 127.0.0.1 -P . -a . dist/ &
          PYPI_PID=$!
          sleep 3
          curl -fsS http://127.0.0.1:8080/simple/ > /dev/null
          python -m pip install \
            --index-url http://127.0.0.1:8080/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            mgcv-rust
          kill "$PYPI_PID" || true
          python -c "import mgcv_rust; print('installed at', mgcv_rust.__file__)"
          python -m pytest tests/usability -q

  verify-windows:
    name: Verify pip install (Windows)
    needs: test-windows
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: test-wheels-windows-x86_64
          path: dist
      - name: pypiserver + pip install + usability suite
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip pypiserver pytest
          pypi-server run -p 8080 -i 127.0.0.1 -P . -a . dist/ &
          PYPI_PID=$!
          sleep 5  # Windows process spawn is slower
          curl -fsS http://127.0.0.1:8080/simple/ > /dev/null
          python -m pip install \
            --index-url http://127.0.0.1:8080/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            mgcv-rust
          kill "$PYPI_PID" || true
          python -c "import mgcv_rust; print('installed at', mgcv_rust.__file__)"
          python -m pytest tests/usability -q
